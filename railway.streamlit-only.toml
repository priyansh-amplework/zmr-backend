# Frontend service (Streamlit only, Nixpacks — no Docker).
# Deploy as a second Railway service. Point it at your API service with a variable:
#   ZMR_API_BASE_URL = https://<your-backend-service>.up.railway.app
# (no trailing slash). Chat calls POST /v1/query/graph on the backend; keep API keys on the backend.
#
# Optional on the backend service: ZMR_CORS_ORIGINS = https://<your-frontend>.up.railway.app
# (only needed if a browser SPA calls the API directly; Streamlit server-side HTTP does not need CORS.)

[build]
builder = "NIXPACKS"

[deploy]
startCommand = "sh -c 'mkdir -p /tmp/streamlit-cache && export HOME=/tmp/streamlit-cache && exec python -m streamlit run streamlit_rbac_ui.py --server.headless=true --server.address=0.0.0.0 --server.port=$PORT --server.fileWatcherType none --browser.gatherUsageStats=false'"
healthcheckPath = "/_stcore/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
