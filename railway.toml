# This repo on Railway = FRONTEND only (Streamlit, Nixpacks — no Docker).
# Backend is separate (already deployed). In Railway → this Streamlit service → Variables, set:
#   ZMR_API_BASE_URL = https://zmr-update-production.up.railway.app
# (no trailing slash; no path — not /health). Redeploy after saving.
#
# Optional on the backend service: ZMR_CORS_ORIGINS = https://<your-frontend>.up.railway.app
# (only if a browser app calls the API directly; Streamlit server → API does not need CORS.)

[build]
builder = "NIXPACKS"

[deploy]
startCommand = "sh -c 'mkdir -p /tmp/streamlit-cache && export HOME=/tmp/streamlit-cache && exec python -m streamlit run streamlit_rbac_ui.py --server.headless=true --server.address=0.0.0.0 --server.port=$PORT --server.fileWatcherType none --browser.gatherUsageStats=false'"
healthcheckPath = "/_stcore/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
