# Backend service (FastAPI only, Nixpacks — no Docker).
# Deploy as its own Railway service. Set DATABASE_URL, PINECONE_*, ANTHROPIC_*, VOYAGE_*, etc. here.
# Public URL is the value you put in the frontend service's ZMR_API_BASE_URL.
#
# Long queries: POST /v1/query/graph/stream returns NDJSON + heartbeats (default every 12s).
# Optional env: ZMR_GRAPH_STREAM_HEARTBEAT_SEC=12

[build]
builder = "NIXPACKS"

[deploy]
# Railway runs startCommand without a shell unless you wrap it — otherwise $PORT is literal.
startCommand = "sh -c 'exec python -m uvicorn zmr_brain.api:app --host 0.0.0.0 --port $PORT'"
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
