# Backend service (FastAPI only, Nixpacks — no Docker).
# Deploy as its own Railway service. Set DATABASE_URL, PINECONE_*, ANTHROPIC_*, VOYAGE_*, etc. here.
# Public URL is the value you put in the frontend service's ZMR_API_BASE_URL.

[build]
builder = "NIXPACKS"

[deploy]
startCommand = "python -m uvicorn zmr_brain.api:app --host 0.0.0.0 --port $PORT"
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
